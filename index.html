<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS OCR Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.11/dist/interact.min.js"></script>
<style>
  body { margin:0; padding:0; background:#000; color:white; font-family:Arial, sans-serif; overflow:hidden; }
  #topBar { position:fixed; top:0; left:0; right:0; z-index:10000; background:rgba(0,0,0,0.9); padding:10px; text-align:center; }
  h2 { margin:5px 0; font-size:26px; }
  #scanResult { width:90%; max-width:500px; margin:8px auto; padding:12px; font-size:22px; border-radius:8px; background:#111; }
  button { 
    padding:18px 40px; font-size:24px; font-weight:bold; 
    background:#0099ff; color:white; border:none; border-radius:12px; 
    cursor:pointer; position:fixed; bottom:30px; left:50%; transform:translateX(-50%); 
    z-index:10001; box-shadow:0 4px 15px rgba(0,153,255,0.4);
  }
  #overlay { position:absolute; inset:0; z-index:100; background:rgba(0,0,0,0.68); pointer-events:none; }
  #scanWindow {
    position:absolute;
    border:4px solid #00ff88;
    background:rgba(255,255,255,0.1);
    box-shadow:0 0 0 9999px rgba(0,0,0,0.75);
    box-sizing:border-box;
    min-width:160px; min-height:110px;
    resize:both; overflow:hidden;
  }
  #status { position:fixed; bottom:110px; left:20px; right:20px; background:rgba(0,0,0,0.85); padding:12px; border-radius:8px; text-align:center; font-size:17px; z-index:10000; }
</style>
</head>
<body>
<div id="topBar">
  <h2>FS OCR Scanner</h2>
  <input type="text" id="scanResult" placeholder="Result appears here" readonly>
</div>

<div style="position:fixed; top:70px; bottom:0; left:0; right:0; background:#000;">
  <video id="video" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
  <div id="overlay"><div id="scanWindow"></div></div>
</div>

<div id="status">Ready - Tight box over order number</div>
<button id="ocrBtn">SCAN</button>

<script>
const video = document.getElementById("video");
const scanWindow = document.getElementById("scanWindow");
const resultInput = document.getElementById("scanResult");
const statusEl = document.getElementById("status");

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "environment", width: {ideal: 1920}, height: {ideal: 1080} } 
    });
    video.srcObject = stream;
  } catch(e) { setStatus("Camera failed"); }
}

function setStatus(msg) { statusEl.innerText = msg; }

function initScanBox() {
  scanWindow.style.left = "8%";
  scanWindow.style.top = "30%";
  scanWindow.style.width = "84%";
  scanWindow.style.height = "32%";

  interact(scanWindow)
    .draggable({ listeners: { move(e) {
      let x = (parseFloat(scanWindow.dataset.x)||0) + e.dx;
      let y = (parseFloat(scanWindow.dataset.y)||0) + e.dy;
      scanWindow.style.transform = `translate(${x}px, ${y}px)`;
      scanWindow.dataset.x = x; scanWindow.dataset.y = y;
    }}})
    .resizable({
      edges: {left:true,right:true,top:true,bottom:true},
      listeners: { move(e) {
        let x = parseFloat(scanWindow.dataset.x)||0;
        let y = parseFloat(scanWindow.dataset.y)||0;
        x += e.deltaRect.left; y += e.deltaRect.top;
        scanWindow.style.width = e.rect.width+"px";
        scanWindow.style.height = e.rect.height+"px";
        scanWindow.style.transform = `translate(${x}px, ${y}px)`;
        scanWindow.dataset.x = x; scanWindow.dataset.y = y;
      }}
    });
}

async function runOCR() {
  setStatus("Scanning...");
  try {
    const rect = scanWindow.getBoundingClientRect();
    const vRect = video.getBoundingClientRect();
    const scaleX = video.videoWidth / vRect.width;
    const scaleY = video.videoHeight / vRect.height;

    const canvas = document.createElement("canvas");
    canvas.width = Math.floor(rect.width * scaleX);
    canvas.height = Math.floor(rect.height * scaleY);
    const ctx = canvas.getContext("2d");
    ctx.filter = "grayscale(100%) contrast(240%) brightness(140%)";
    ctx.drawImage(video, (rect.left-vRect.left)*scaleX, (rect.top-vRect.top)*scaleY, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);

    const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
      tessedit_pageseg_mode: 6,
      tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",
    });

    console.log("Raw OCR:", text);

    let cleaned = text.toUpperCase().replace(/[^A-Z0-9]/g, '');

    cleaned = cleaned
      .replace(/O/g, '0')
      .replace(/I|L/g, '1')
      .replace(/B/g, '8')
      .replace(/S/g, '5')
      .replace(/G/g, '6')
      .replace(/Z/g, '2');

    // Comprehensive prefix fixes for ALL patterns
    cleaned = cleaned
      .replace(/^5W/, 'SW')
      .replace(/^H?5?W/, 'SW')
      .replace(/^A?%?W/, 'SW')
      .replace(/^0{1,3}5?W?E?/, 'SW8')
      .replace(/^5W8/, 'SW8')
      // FS801
      .replace(/^F5/, 'FS')
      .replace(/^FS0/, 'FS8')
      // SG801
      .replace(/^5G/, 'SG')
      .replace(/^S6/, 'SG')
      // 900 series
      .replace(/^0{1,2}(9|G|W|M|T)/, '$1');

    console.log("Cleaned:", cleaned);

    const match = cleaned.match(/(SW801|FS801|SG801|W900|M900|T900|G900)[0-9]{5,}/);

    if (match) {
      const final = match[0];
      resultInput.value = final;
      setStatus("✅ " + final);
      if (window.opener) window.opener.postMessage({ type: "barcode", value: final }, "*");
    } else {
      resultInput.value = cleaned.substring(0, 35);
      setStatus("No match - get closer / tighten box");
    }
  } catch (err) {
    console.error(err);
    setStatus("OCR Error - Try again");
  }
}

document.getElementById("ocrBtn").addEventListener("click", runOCR);
startCamera();
initScanBox();
</script>
</body>
</html>
