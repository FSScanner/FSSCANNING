<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS OCR Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.11/dist/interact.min.js"></script>
<style>
  body { margin:0; padding:0; background:#000; color:white; font-family:Arial, sans-serif; overflow:hidden; }
  #topBar {
    position:fixed; top:0; left:0; right:0; z-index:10000;
    background:rgba(0,0,0,0.9); padding:10px; text-align:center;
  }
  h2 { margin:5px 0; font-size:26px; }
  #scanResult { width:90%; max-width:500px; margin:8px auto; padding:12px; font-size:22px; border-radius:8px; }
  button { padding:14px 24px; font-size:20px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; margin:5px; }
  #ocrBtn { background:#0099ff; color:white; }

  #readerContainer {
    position:fixed; top:70px; left:0; right:0; bottom:0; background:#000;
  }
  video { width:100%; height:100%; object-fit:cover; }

  /* Improved Overlay */
  #overlay {
    position:absolute; inset:0; z-index:100;
    background:rgba(0,0,0,0.7);
    pointer-events: none;
  }
  #scanWindow {
    position:absolute;
    border:4px solid #00ff00; /* brighter green for visibility */
    background: rgba(255,255,255,0.15); /* light inside */
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.75),
                inset 0 0 20px rgba(0,255,0,0.3);
    box-sizing: border-box;
    min-width: 160px;
    min-height: 100px;
    resize: both;
    overflow: hidden;
    touch-action: none;
  }

  #statusMessage {
    position:fixed; bottom:20px; left:20px; right:20px; z-index:10001;
    background:rgba(0,0,0,0.85); padding:14px; border-radius:8px; text-align:center; font-size:18px;
  }
</style>
</head>
<body>
<div id="topBar">
  <h2>FS OCR Scanner</h2>
  <input type="text" id="scanResult" placeholder="Detected order number" readonly>
  <button id="ocrBtn">Scan Text</button>
</div>

<div id="readerContainer">
  <video id="reader" autoplay playsinline></video>
  <div id="overlay">
    <div id="scanWindow"></div>
  </div>
</div>

<div id="statusMessage">Starting camera...</div>

<script>
let stream = null;
const video = document.getElementById("reader");
const scanWindow = document.getElementById("scanWindow");
const statusMessage = document.getElementById("statusMessage");
const scanResultInput = document.getElementById("scanResult");

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "environment", width: {ideal:1280} } 
    });
    video.srcObject = stream;
    setStatus("Camera ready - Drag & resize the box");
  } catch (err) {
    setStatus("Camera failed");
  }
}

function setStatus(msg) { statusMessage.innerText = msg; }

// Drag + Resize
function initScanWindow() {
  scanWindow.style.left = "10%";
  scanWindow.style.top = "30%";
  scanWindow.style.width = "80%";
  scanWindow.style.height = "32%";

  interact(scanWindow)
    .draggable({
      listeners: {
        move(e) {
          let x = (parseFloat(scanWindow.dataset.x) || 0) + e.dx;
          let y = (parseFloat(scanWindow.dataset.y) || 0) + e.dy;
          scanWindow.style.transform = `translate(${x}px, ${y}px)`;
          scanWindow.dataset.x = x;
          scanWindow.dataset.y = y;
        }
      }
    })
    .resizable({
      edges: { left: true, right: true, top: true, bottom: true },
      margin: 15,
      listeners: {
        move(e) {
          let x = parseFloat(scanWindow.dataset.x) || 0;
          let y = parseFloat(scanWindow.dataset.y) || 0;
          x += e.deltaRect.left;
          y += e.deltaRect.top;

          scanWindow.style.width = e.rect.width + "px";
          scanWindow.style.height = e.rect.height + "px";
          scanWindow.style.transform = `translate(${x}px, ${y}px)`;
          scanWindow.dataset.x = x;
          scanWindow.dataset.y = y;
        }
      }
    });
}

async function runOCR() {
  setStatus("Scanning...");
  try {
    const rect = scanWindow.getBoundingClientRect();
    const vRect = video.getBoundingClientRect();

    const scaleX = video.videoWidth / vRect.width;
    const scaleY = video.videoHeight / vRect.height;

    const canvas = document.createElement("canvas");
    canvas.width = Math.floor(rect.width * scaleX);
    canvas.height = Math.floor(rect.height * scaleY);
    const ctx = canvas.getContext("2d");

    // Very strong preprocessing
    ctx.filter = "grayscale(100%) contrast(380%) brightness(155%) saturate(1.2)";
    ctx.drawImage(video, 
      Math.floor((rect.left - vRect.left) * scaleX),
      Math.floor((rect.top - vRect.top) * scaleY),
      canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);

    const imageDataUrl = canvas.toDataURL("image/png", 0.95);

    const result = await Tesseract.recognize(imageDataUrl, "eng", {
      tessedit_pageseg_mode: "7",
      tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",
    });

    let text = result.data.text.toUpperCase().replace(/[^A-Z0-9]/g, '');

    console.log("Raw OCR:", text);

    // Aggressive corrections for common misreads
    let cleaned = text
      .replace(/T/g, '1')     // T often = 1
      .replace(/W/g, '8')     // W misread as 8 or part of 7
      .replace(/E/g, '8')     // E -> 8 sometimes
      .replace(/H/g, '8')
      .replace(/S/g, '5')
      .replace(/O/g, '0')
      .replace(/I/g, '1')
      .replace(/L/g, '1')
      .replace(/B/g, '8')
      .replace(/G/g, '6')
      .replace(/Z/g, '2');

    console.log("Cleaned:", cleaned);

    const match = cleaned.match(/SW801[0-9]{6,}/) || 
                  cleaned.match(/FS801[0-9]{5,}/) ||
                  cleaned.match(/[A-Z0-9]{11,}/);

    if (match) {
      const final = match[0];
      scanResultInput.value = final;
      setStatus("Detected: " + final);
      if (window.opener) window.opener.postMessage({ type: "barcode", value: final }, "*");
      setTimeout(() => window.close(), 600);
    } else {
      setStatus("No match - move box tighter");
    }
  } catch (e) {
    console.error(e);
    setStatus("OCR failed - try again");
  }
}

document.getElementById("ocrBtn").addEventListener("click", runOCR);
startCamera();
initScanWindow();
</script>
</body>
</html>
