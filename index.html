<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS OCR Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.11/dist/interact.min.js"></script>
<style>
  body { margin:0; padding:0; background:#000; color:white; font-family:Arial, sans-serif; overflow:hidden; }
  #topBar {
    position:fixed; top:0; left:0; right:0; z-index:10000;
    background:rgba(0,0,0,0.9); padding:10px; text-align:center;
  }
  h2 { margin:5px 0; font-size:26px; }
  #scanResult { width:90%; max-width:500px; margin:8px auto; padding:12px; font-size:22px; border-radius:8px; display:block; }
  button {
    padding:14px 24px; font-size:20px; font-weight:bold; border:none; border-radius:8px; cursor:pointer; margin:5px;
  }
  #ocrBtn { background:#0099ff; color:white; }

  #readerContainer {
    position:fixed; top:70px; left:0; width:100vw; height:calc(100vh - 70px); background:#000; overflow:hidden;
  }
  video { width:100%; height:100%; object-fit:cover; }

  /* Overlay with transparent center */
  #overlay {
    position:absolute; inset:0; z-index:100;
    background:rgba(0,0,0,0.65); /* outside darkness */
    pointer-events:none;
  }
  #scanWindow {
    position:absolute;
    border:4px solid #fbbf00;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.65); /* dark outside only */
    background: transparent;
    box-sizing:border-box;
    min-width:180px; min-height:100px;
  }

  #statusMessage {
    position:fixed; bottom:20px; left:20px; right:20px; z-index:10001;
    background:rgba(0,0,0,0.85); padding:14px; border-radius:8px; text-align:center; font-size:18px;
  }
</style>
</head>
<body>
<div id="topBar">
  <h2>FS OCR Scanner</h2>
  <input type="text" id="scanResult" placeholder="Detected order number" readonly>
  <button id="ocrBtn">Scan Text</button>
</div>

<div id="readerContainer">
  <video id="reader" autoplay playsinline></video>
  <div id="overlay">
    <div id="scanWindow"></div>
  </div>
</div>

<div id="statusMessage">Starting camera...</div>

<script>
let stream = null;
const scanResultInput = document.getElementById("scanResult");
const statusMessage = document.getElementById("statusMessage");
const scanWindow = document.getElementById("scanWindow");
const video = document.getElementById("reader");

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => setStatus("Camera ready - Drag/resize yellow box over label then tap Scan");
  } catch (err) {
    setStatus("Camera error: " + err.message);
  }
}

function setStatus(msg) {
  statusMessage.innerText = msg;
}

// Draggable + Resizable
function initScanWindow() {
  scanWindow.style.left = "8%";
  scanWindow.style.top = "32%";
  scanWindow.style.width = "84%";
  scanWindow.style.height = "32%";

  interact(scanWindow)
    .draggable({
      listeners: {
        move(e) {
          let x = (parseFloat(scanWindow.getAttribute('data-x')) || 0) + e.dx;
          let y = (parseFloat(scanWindow.getAttribute('data-y')) || 0) + e.dy;
          scanWindow.style.transform = `translate(${x}px, ${y}px)`;
          scanWindow.setAttribute('data-x', x);
          scanWindow.setAttribute('data-y', y);
        }
      }
    })
    .resizable({
      edges: { left: true, right: true, bottom: true, top: true },
      listeners: {
        move(e) {
          let { x = 0, y = 0 } = scanWindow.dataset;
          x = parseFloat(x) + e.deltaRect.left;
          y = parseFloat(y) + e.deltaRect.top;
          Object.assign(scanWindow.style, {
            width: `${e.rect.width}px`,
            height: `${e.rect.height}px`,
            transform: `translate(${x}px, ${y}px)`
          });
          Object.assign(scanWindow.dataset, { x, y });
        }
      }
    });
}

async function runOCR() {
  setStatus("Scanning...");
  try {
    const rect = scanWindow.getBoundingClientRect();
    const vRect = video.getBoundingClientRect();

    const scaleX = video.videoWidth / vRect.width;
    const scaleY = video.videoHeight / vRect.height;

    const crop = {
      x: Math.floor((rect.left - vRect.left) * scaleX),
      y: Math.floor((rect.top - vRect.top) * scaleY),
      w: Math.floor(rect.width * scaleX),
      h: Math.floor(rect.height * scaleY)
    };

    const canvas = document.createElement("canvas");
    canvas.width = crop.w;
    canvas.height = crop.h;
    const ctx = canvas.getContext("2d");

    // Strong preprocessing for better OCR on labels
    ctx.filter = "grayscale(100%) contrast(320%) brightness(135%)";
    ctx.drawImage(video, crop.x, crop.y, crop.w, crop.h, 0, 0, crop.w, crop.h);

    const imageDataUrl = canvas.toDataURL("image/png", 0.92);

    const result = await Tesseract.recognize(imageDataUrl, "eng", {
      tessedit_pageseg_mode: "6",           // better for single block text
      tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 -",
    });

    let raw = result.data.text.trim();
    console.log("Raw:", raw);

    let cleaned = raw
      .toUpperCase()
      .replace(/[^A-Z0-9 -]/g, '')
      .replace(/\s+/g, ' ')
      .trim();

    // Fix common OCR mistakes
    cleaned = cleaned
      .replace(/H/g, 'W')   // H often misread from W
      .replace(/L/g, '1')   // L -> 1
      .replace(/I/g, '1')
      .replace(/B/g, '8')
      .replace(/S/g, '5')   // sometimes
      .replace(/O/g, '0')
      .replace(/Z/g, '2')
      .replace(/G/g, '6');

    console.log("Cleaned:", cleaned);

    // Match patterns
    const match = cleaned.match(/(SW801|FS801|SG801|W900|M900|G900|T900)[A-Z0-9 -]{5,}/i) ||
                  cleaned.match(/[A-Z0-9]{10,15}/);

    if (!match) {
      setStatus("No order found - Adjust box and retry");
      alert("Could not read clearly. Try moving the box tighter over the text.");
      return;
    }

    const orderNumber = match[0].replace(/\s+/g, '');
    sendToParent(orderNumber);

  } catch (err) {
    console.error(err);
    setStatus("OCR failed");
  }
}

function sendToParent(value) {
  scanResultInput.value = value;
  setStatus("Success: " + value);
  if (window.opener) window.opener.postMessage({ type: "barcode", value: value }, "*");
  setTimeout(() => window.close(), 700);
}

// Start everything
document.getElementById("ocrBtn").addEventListener("click", runOCR);
startCamera();
initScanWindow();
</script>
</body>
</html>
