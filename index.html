<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FS Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body {
  margin: 0;
  padding: 0;
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#topBar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.85);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

h2 {
  margin: 0;
  font-size: 28px;
  text-align: center;
}

#scanResult {
  width: 100%;
  box-sizing: border-box;
  padding: 14px;
  font-size: 24px;
  border-radius: 8px;
  border: none;
}

.buttonRow {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 16px;
  font-size: 22px;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#startScanBtn { background: #fbbf00; color: black; }
#stopScanBtn { background: #cc0000; color: white; }
#ocrBtn { background: #0099ff; color: white; }

#reader {
  position: fixed;
  top: 170px;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100vw;
  height: calc(100vh - 170px);
  overflow: hidden;
}

  #reader {
  position: relative;
}

#reader::after {
  content: "";
  position: absolute;
  top: 50%;
  left: 10%;
  right: 10%;
  height: 2px;
  background: red;
  opacity: 0.6;
}

video {
  object-fit: cover !important;
}

#statusMessage {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  z-index: 9999;
  background: rgba(0,0,0,0.8);
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  font-size: 20px;
}

</style>

</head>

<body>

<div id="topBar">

  <h2>FS Scanner</h2>

  <input type="text" id="scanResult" placeholder="Scanned result">

  <div class="buttonRow">
    <button id="startScanBtn">Start</button>
    <button id="stopScanBtn" disabled>Stop</button>
    <button id="ocrBtn">Scan Text</button>
  </div>

</div>

<div id="reader"></div>

<div id="statusMessage">Ready</div>

<script>

let codeReader = null;
let selectedDeviceId = null;
let scanning = false;

const scanResultInput = document.getElementById("scanResult");
const statusMessage = document.getElementById("statusMessage");

function setStatus(message) {
  statusMessage.innerText = message;
}

function sendToAppsScript(value) {

  const raw = value.toString().trim();

  scanResultInput.value = raw;

  if (!window.opener) {
    alert("No parent window found");
    return;
  }

  window.opener.postMessage({
    type: "barcode",
    value: raw
  }, "*");

  setStatus("Sent: " + raw);

  setTimeout(() => window.close(), 300);
}

async function startScanner() {

  if (scanning) return;
  scanning = true;

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();

    setStatus("Starting camera...");

    const videoInputDevices = await ZXing.BrowserMultiFormatReader.listVideoInputDevices();

    if (!videoInputDevices.length) {
      setStatus("No camera found");
      return;
    }

    // use back camera if available
    selectedDeviceId = videoInputDevices[0].deviceId;

    const rearCamera = videoInputDevices.find(device =>
      device.label.toLowerCase().includes("back") ||
      device.label.toLowerCase().includes("rear")
    );

    if (rearCamera) {
      selectedDeviceId = rearCamera.deviceId;
    }

    codeReader.decodeFromVideoDevice(
      selectedDeviceId,
      "reader",
      (result, err) => {

        if (result) {
          const raw = result.getText();

          setStatus("Barcode detected");

          sendToAppsScript(raw);

          stopScanner();
        }

        if (err && !(err instanceof ZXing.NotFoundException)) {
          console.error(err);
        }
      }
    );

    setStatus("Scanning... align barcode");

  } catch (err) {
    console.error(err);
    setStatus("Camera failed: " + err.message);
  }
}

async function stopScanner() {

  scanning = false;

  try {
    if (codeReader) {
      codeReader.reset();
      codeReader = null;
    }
  } catch (e) {
    console.warn(e);
  }

  setStatus("Stopped");
}
async function runOCR() {

  setStatus("Reading text...");

  try {

    const video = document.querySelector("video");

    if (!video) {
      alert("Camera not running");
      return;
    }

    const canvas = document.createElement("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");

    ctx.filter = "grayscale(100%) contrast(200%) brightness(120%)";
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const image = canvas.toDataURL("image/png");

    const result = await Tesseract.recognize(image, 'eng');

    const text = result.data.text;

    const cleanedText = text
      .toUpperCase()
      .replace(/\r/g, ' ')
      .replace(/\n/g, ' ')
      .replace(/\s+/g, ' ');

    const normalized = cleanedText
      .replace(/O/g, '0')
      .replace(/I/g, '1')
      .replace(/B/g, '8');

    const match = normalized.match(
      /\b(G9|M9|W9|FS8|SG8|SW8|T9)[A-Z0-9\/_-]*\b/
    );

    if (!match) {
      setStatus("No valid order found");
      alert("No valid order number detected");
      return;
    }

    const value = match[0].toString().trim();

window.opener.postMessage({
  type: "barcode",
  value: value
}, "*");

setStatus("Order sent");
setTimeout(() => window.close(), 300);

  } catch(err) {
    console.error(err);
    setStatus("OCR failed");
  }
}

document.getElementById("startScanBtn").addEventListener("click", startScanner);
document.getElementById("stopScanBtn").addEventListener("click", stopScanner);
document.getElementById("ocrBtn").addEventListener("click", runOCR);

startScanner();

</script>

</body>
</html>
