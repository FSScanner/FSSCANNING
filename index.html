<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS OCR Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body {
  margin: 0;
  padding: 0;
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#topBar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.85);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

h2 {
  margin: 0;
  font-size: 28px;
  text-align: center;
}

#scanResult {
  width: 100%;
  box-sizing: border-box;
  padding: 14px;
  font-size: 24px;
  border-radius: 8px;
  border: none;
}

.buttonRow {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 16px;
  font-size: 22px;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#ocrBtn { background: #0099ff; color: white; }

video {
  object-fit: cover !important;
  width: 100%;
  height: 100%;
}

#readerContainer {
  position: fixed;
  top: 170px;
  left: 0;
  width: 100vw;
  height: calc(100vh - 170px);
  background: black;
}

#scanGuide {
  position: absolute;
  left: 10%;
  top: 40%;
  width: 80%;
  height: 20%;
  border: 3px solid #fbbf00;
  border-radius: 8px;
  box-shadow: 0 0 15px rgba(251,191,0,0.8);
  pointer-events: none;
}

#statusMessage {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  z-index: 9999;
  background: rgba(0,0,0,0.8);
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  font-size: 20px;
}

</style>

</head>

<body>

<div id="topBar">

  <h2>FS OCR Scanner</h2>

  <input type="text" id="scanResult" placeholder="Detected result">

  <div class="buttonRow">
    <button id="ocrBtn">Scan Text</button>
  </div>

</div>

<div id="readerContainer">
  <video id="reader" autoplay playsinline></video>
  <div id="scanGuide"></div>
</div>

<div id="statusMessage">Starting camera...</div>

<script>

let stream = null;

const scanResultInput = document.getElementById("scanResult");
const statusMessage = document.getElementById("statusMessage");

function setStatus(msg) {
  statusMessage.innerText = msg;
}

async function startCamera() {

  try {

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment"
      },
      audio: false
    });

    const video = document.getElementById("reader");
    video.srcObject = stream;

    setStatus("Camera ready - align label and tap Scan Text");

  } catch (err) {
    console.error(err);
    setStatus("Camera failed: " + err.message);
  }
}

function sendToParent(value) {

  const raw = value.toString().trim();
  scanResultInput.value = raw;

  if (!window.opener) {
    alert("No parent window found");
    return;
  }

  window.opener.postMessage({
    type: "barcode",
    value: raw
  }, "*");

  setStatus("Sent: " + raw);
  setTimeout(() => window.close(), 300);
}

async function runOCR() {
  setStatus("Reading text...");
  try {
    const video = document.getElementById("reader");
    if (!video.videoWidth || !video.videoHeight) {
      setStatus("Camera not ready");
      return;
    }

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    // Crop to scan guide
    const guideX = Math.floor(video.videoWidth * 0.10);
    const guideY = Math.floor(video.videoHeight * 0.40);
    const guideW = Math.floor(video.videoWidth * 0.80);
    const guideH = Math.floor(video.videoHeight * 0.20);

    canvas.width = guideW;
    canvas.height = guideH;

    ctx.filter = "grayscale(100%) contrast(240%) brightness(125%)";
    ctx.drawImage(video, guideX, guideY, guideW, guideH, 0, 0, guideW, guideH);

    const imageDataUrl = canvas.toDataURL("image/png");

    const result = await Tesseract.recognize(imageDataUrl, "eng", {
      tessedit_pageseg_mode: "6",
      tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/._-",
    });

    let text = result.data.text.trim();
    console.log("Raw OCR:", JSON.stringify(text));
    console.log("Confidence:", result.data.confidence);

    // === FIXED CLEANING - hyphen is now safely at the end ===
    let cleaned = text
      .toUpperCase()
      .replace(/[^A-Z0-9\/._-]/g, '')   // hyphen safely at the end
      .replace(/O/g, '0')
      .replace(/I/g, '1')
      .replace(/B/g, '8')
      .replace(/S/g, '5')
      .replace(/Z/g, '2');

    console.log("Cleaned:", JSON.stringify(cleaned));

    // === Matching - now properly supports - and _ ===
    const patterns = [
      /(G900|M900|W900|FS801|SG801|SW801|T900)[A-Z0-9\/._-]{3,}/i,
      /[A-Z0-9\/._-]{10,}/
    ];

    let match = null;
    for (const regex of patterns) {
      match = cleaned.match(regex);
      if (match) break;
    }

    if (!match || !match[0]) {
      setStatus("No valid order found");
      alert("No valid order number detected.\n\nRaw text:\n" + text);
      return;
    }

    const detected = match[0];
    console.log("✅ Detected order:", detected);

    sendToParent(detected);

  } catch (err) {
    console.error(err);
    setStatus("OCR failed: " + err.message);
    alert("OCR Error: " + err.message);
  }
}

document.getElementById("ocrBtn").addEventListener("click", runOCR);

startCamera();

</script>

</body>
</html>
