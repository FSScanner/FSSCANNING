<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS OCR Scanner - PaddleOCR</title>
<script src="https://cdn.jsdelivr.net/npm/@paddlejs/paddleocr@latest/dist/paddleocr.min.js"></script>
<style>
  body { margin:0; padding:0; background:#000; color:white; font-family:Arial, sans-serif; }
  #topBar { position:fixed; top:0; left:0; right:0; z-index:10000; background:rgba(0,0,0,0.9); padding:10px; text-align:center; }
  button { padding:16px 32px; font-size:22px; background:#00cc66; color:white; border:none; border-radius:8px; margin:10px; }
  #scanResult { font-size:24px; padding:12px; background:#111; width:90%; margin:10px auto; border-radius:8px; }
  #statusMessage { position:fixed; bottom:20px; left:20px; right:20px; background:rgba(0,0,0,0.85); padding:14px; border-radius:8px; text-align:center; }
</style>
</head>
<body>
<div id="topBar">
  <h2>PaddleOCR Scanner</h2>
  <div id="scanResult">Waiting for scan...</div>
  <button id="ocrBtn">Scan Text</button>
</div>

<div style="position:fixed;top:80px;bottom:0;left:0;right:0;background:#000">
  <video id="reader" autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>
</div>

<div id="statusMessage">Starting camera...</div>

<script>
const video = document.getElementById("reader");
const scanResult = document.getElementById("scanResult");
const statusMessage = document.getElementById("statusMessage");

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  video.srcObject = stream;
  setStatus("Camera ready - Point at label and tap Scan");
}

function setStatus(msg) {
  statusMessage.innerText = msg;
}

async function runOCR() {
  setStatus("Analyzing with PaddleOCR...");
  try {
    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    // Use PaddleOCR
    const result = await paddleOCR.recognize(canvas, {
      useAngle: true,
      usePaddle: true
    });

    let text = result.text || "";
    console.log("PaddleOCR Result:", text);

    let cleaned = text.toUpperCase().replace(/[^A-Z0-9]/g, '');

    // Same prefix fixes as before
    cleaned = cleaned
      .replace(/^A?%?W/, 'SW')
      .replace(/^0{1,3}5?W?E?/, 'SW8')
      .replace(/O/g, '0')
      .replace(/I|L/g, '1')
      .replace(/B/g, '8');

    const match = cleaned.match(/(SW801|FS801|SG801|W900|M900|T900|G900)[0-9]{5,}/);

    if (match) {
      const final = match[0];
      scanResult.textContent = final;
      setStatus("✅ Success: " + final);
      if (window.opener) window.opener.postMessage({ type: "barcode", value: final }, "*");
    } else {
      scanResult.textContent = cleaned.substring(0, 30) || "No match";
      setStatus("Try different angle or lighting");
    }
  } catch (err) {
    console.error(err);
    setStatus("PaddleOCR failed - falling back or try again");
  }
}

// Init
document.getElementById("ocrBtn").addEventListener("click", runOCR);
startCamera();
</script>
</body>
</html>
