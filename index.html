<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.11/dist/interact.min.js"></script>
<style>
  body { margin:0; padding:0; background:#000; color:white; font-family:Arial, sans-serif; overflow:hidden; }
  #topBar { position:fixed; top:0; left:0; right:0; z-index:10000; background:rgba(0,0,0,0.9); padding:10px; text-align:center; }
  h2 { margin:5px 0; font-size:26px; }
  .modeTabs { display:flex; gap:10px; justify-content:center; margin:8px 0; }
  .tab { padding:12px 24px; background:#333; border-radius:8px; cursor:pointer; font-size:18px; }
  .tab.active { background:#0099ff; color:white; }
  #scanResult { width:90%; max-width:500px; margin:8px auto; padding:12px; font-size:22px; border-radius:8px; background:#111; }
  button {
    padding:18px 40px; font-size:24px; font-weight:bold;
    background:#34a853; color:white; border:none; border-radius:12px;
    cursor:pointer; margin:8px;
  }
  #overlay { position:absolute; inset:0; z-index:100; background:rgba(0,0,0,0.25); pointer-events:none; }
  #scanWindow {
    position:absolute;
    border:4px solid #00ff88;
    background:rgba(255,255,255,0.08);
    box-shadow:0 0 0 9999px rgba(0,0,0,0.25);
    box-sizing:border-box;
    min-width:160px; min-height:80px;
    resize:both; overflow:hidden;
  }
  #status { position:fixed; bottom:110px; left:20px; right:20px; background:rgba(0,0,0,0.85); padding:12px; border-radius:8px; text-align:center; font-size:17px; z-index:10000; }
</style>
</head>
<body>
<div id="topBar">
  <h2>FS Scanner</h2>
  <div class="modeTabs">
    <div class="tab active" id="tabBarcode">Barcode Mode</div>
    <div class="tab" id="tabText">Text Mode</div>
  </div>
  <input type="text" id="scanResult" placeholder="Result appears here" readonly>
</div>

<div style="position:fixed; top:120px; bottom:0; left:0; right:0; background:#000;">
  <video id="video" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
  <div id="overlay"><div id="scanWindow"></div></div>
</div>

<div id="status">Ready - Select mode and scan</div>
<button id="actionBtn">Start Scanning</button>

<script>
let currentMode = "barcode";
let html5QrCode = null;

const video = document.getElementById("video");
const scanWindow = document.getElementById("scanWindow");
const resultInput = document.getElementById("scanResult");
const statusEl = document.getElementById("status");
const actionBtn = document.getElementById("actionBtn");

// Tab switching
document.getElementById("tabBarcode").addEventListener("click", () => switchMode("barcode"));
document.getElementById("tabText").addEventListener("click", () => switchMode("text"));

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === `tab${mode.charAt(0).toUpperCase() + mode.slice(1)}`));
  setStatus(`Switched to ${mode} mode`);
  stopAll();
}

function setStatus(msg) { statusEl.innerText = msg; }

function initScanBox() {
  scanWindow.style.left = "8%";
  scanWindow.style.top = "35%";
  scanWindow.style.width = "84%";
  scanWindow.style.height = "22%";
}

function startScanning() {
  if (currentMode === "barcode") startBarcodeMode();
  else startTextMode();
}

function startBarcodeMode() {
  html5QrCode = new Html5Qrcode("video");
  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 12, qrbox: { width: 300, height: 160 } },
    (decodedText) => sendResult(decodedText)
  ).catch(err => {
    console.error(err);
    setStatus("Camera error");
  });
}

async function startTextMode() {
  setStatus("Text mode - position box over order number");
  try {
    const rect = scanWindow.getBoundingClientRect();
    const vRect = video.getBoundingClientRect();
    const scaleX = video.videoWidth / vRect.width;
    const scaleY = video.videoHeight / vRect.height;

    const canvas = document.createElement("canvas");
    canvas.width = Math.floor(rect.width * scaleX);
    canvas.height = Math.floor(rect.height * scaleY);
    const ctx = canvas.getContext("2d");
    ctx.filter = "grayscale(100%) contrast(260%) brightness(155%)";
    ctx.drawImage(video, (rect.left-vRect.left)*scaleX, (rect.top-vRect.top)*scaleY, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);

    const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
      tessedit_pageseg_mode: 7,
      tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/-",
    });

    console.log("Raw OCR:", text);

    let cleaned = text.toUpperCase().replace(/[^A-Z0-9/-]/g, '');

    const match = cleaned.match(/(SW801|FS801|SG801|W900|M900|T900|G900)[0-9]{5,}(?:[-/_][A-Z0-9]+)?/i);

    if (match) sendResult(match[0]);
    else setStatus("No match - tighten box");
  } catch (err) {
    console.error(err);
    setStatus("Text OCR failed");
  }
}

function sendResult(value) {
  resultInput.value = value;
  setStatus("✅ " + value);
  if (window.opener) {
    window.opener.postMessage({ type: "barcode", value: value }, "*");
  }
  setTimeout(() => window.close(), 800);
}

function stopAll() {
  if (html5QrCode) {
    html5QrCode.stop().catch(() => {});
    html5QrCode = null;
  }
}

actionBtn.addEventListener("click", startScanning);
initScanBox();
startCamera(); // start camera immediately
</script>
</body>
</html>
