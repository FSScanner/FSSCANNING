<!-- html5-qrcode library -->
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<h2>Barcode / QR Scanner</h2>

<label for="scanResult">Scanned code:</label>
<input type="text" id="scanResult" style="width: 100%; max-width: 400px;" />

<div id="reader" style="width: 300px; margin-top: 20px;"></div>

<button id="startScanBtn">Start scanning</button>
<button id="stopScanBtn" disabled>Stop scanning</button>

<script>
  let html5QrcodeScanner = null;

  const startScanBtn = document.getElementById("startScanBtn");
  const stopScanBtn = document.getElementById("stopScanBtn");
  const scanResultInput = document.getElementById("scanResult");

  // 🔥 SEND TO APPS SCRIPT
  function sendToAppsScript(barcode) {

    // Send to parent Apps Script page
    window.opener.postMessage({type: barcode, value: barcode.trim()}, "https://script.google.com");

  }

  startScanBtn.addEventListener("click", async () => {

    if (html5QrcodeScanner) return;

    const config = {
      fps: 10,
      qrbox: { width: 250, height: 250 },
      rememberLastUsedCamera: true
    };

    html5QrcodeScanner = new Html5Qrcode("reader");

    try {

      await html5QrcodeScanner.start(
        { facingMode: "environment" },

        config,

        (decodedText) => {

          const cleaned = decodedText.trim();

          // still show locally (optional)
          scanResultInput.value = cleaned;

          // 🔥 SEND TO MAIN APP
          window.parent.postMessage({
  type: "barcode",
  value: cleaned
}, "*");

          html5QrcodeScanner.stop().then(() => {
            html5QrcodeScanner.clear();
            html5QrcodeScanner = null;

            startScanBtn.disabled = false;
            stopScanBtn.disabled = true;
          });

        },

        (errorMessage) => {}

      );

      startScanBtn.disabled = true;
      stopScanBtn.disabled = false;

    } catch (err) {
      console.error("Unable to start scanning:", err);
      html5QrcodeScanner = null;
    }

  });

  stopScanBtn.addEventListener("click", () => {

    if (!html5QrcodeScanner) return;

    html5QrcodeScanner.stop().then(() => {
      html5QrcodeScanner.clear();
      html5QrcodeScanner = null;

      startScanBtn.disabled = false;
      stopScanBtn.disabled = true;

    });

  });
</script>
