<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FS OCR Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs@1.10.11/dist/interact.min.js"></script>
<title>FS Barcode Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  body { margin:0; padding:0; background:#000; color:white; font-family:Arial, sans-serif; overflow:hidden; }
  #topBar { position:fixed; top:0; left:0; right:0; z-index:10000; background:rgba(0,0,0,0.2); padding:10px; text-align:center; }
  h2 { margin:5px 0; font-size:26px; }
  #scanResult { width:90%; max-width:500px; margin:8px auto; padding:12px; font-size:22px; border-radius:8px; background:#111; }
  
  .buttonContainer {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    z-index:10001; display:flex; gap:15px; flex-wrap:wrap; justify-content:center;
  }
  
  button {
    padding:18px 40px; font-size:24px; font-weight:bold;
    background:#0099ff; color:white; border:none; border-radius:12px;
    cursor:pointer; box-shadow:0 4px 15px rgba(0,153,255,0.2);
    min-width:160px;
  }
  .pasteBtn { background:#34a853; }

  #overlay { position:absolute; inset:0; z-index:100; background:rgba(0,0,0,0.2); pointer-events:none; }
  #scanWindow {
    position:absolute;
    border:4px solid #00ff88;
    background:rgba(255,255,255,0.1);
    box-shadow:0 0 0 9999px rgba(0,0,0,0.2);
    box-sizing:border-box;
    min-width:160px; min-height:80px;
    resize:both; overflow:hidden;
  }
  #status { position:fixed; bottom:120px; left:20px; right:20px; background:rgba(0,0,0,0.2); padding:12px; border-radius:8px; text-align:center; font-size:17px; z-index:10000; }
  body { margin:0; padding:0; background:#000; color:white; font-family:Arial, sans-serif; }
  #reader { width:100%; max-width:600px; margin:20px auto; }
  button { padding:18px 40px; font-size:24px; background:#0099ff; color:white; border:none; border-radius:12px; margin:10px; }
  #result { font-size:28px; padding:15px; background:#111; margin:10px; border-radius:8px; text-align:center; }
</style>
</head>
<body>
<div id="topBar">
  <h2>FS OCR Scanner</h2>
  <input type="text" id="scanResult" placeholder="Result appears here" readonly>
</div>

<div style="position:fixed; top:70px; bottom:0; left:0; right:0; background:#000;">
  <video id="video" autoplay playsinline style="width:100%; height:100%; object-fit:cover;"></video>
  <div id="overlay"><div id="scanWindow"></div></div>
</div>

<div id="status">Ready - Tight thin box over order number</div>

<div class="buttonContainer">
  <button id="ocrBtn">📷 SCAN with Camera</button>
  <button class="pasteBtn" id="pasteBtn">📋 Paste from Lens</button>
<div style="text-align:center; padding:20px;">
  <h2>FS Barcode Scanner</h2>
  <div id="reader"></div>
  <div id="result">Waiting for scan...</div>
  <button onclick="stopScanner()">Stop Scanner</button>
</div>

<script>
const video = document.getElementById("video");
const scanWindow = document.getElementById("scanWindow");
const resultInput = document.getElementById("scanResult");
const statusEl = document.getElementById("status");

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "environment", width: {ideal: 1920}, height: {ideal: 1080} } 
    });
    video.srcObject = stream;
  } catch(e) { setStatus("Camera failed"); }
let html5QrCode;

function startScanner() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 300, height: 150 } },
    (decodedText) => {
      document.getElementById("result").innerHTML = "✅ " + decodedText;
      
      // Send back to main page
      if (window.opener) {
        window.opener.postMessage({ type: "barcode", value: decodedText }, "*");
      }
      
      // Optional: auto close after success
      // setTimeout(() => window.close(), 1000);
    },
    (error) => { /* silent */ }
  ).catch(err => {
    console.error(err);
    document.getElementById("result").innerHTML = "Camera error";
  });
}

function setStatus(msg) { statusEl.innerText = msg; }

function initScanBox() {
  scanWindow.style.left = "8%";
  scanWindow.style.top = "38%";
  scanWindow.style.width = "84%";
  scanWindow.style.height = "18%";
function stopScanner() {
  if (html5QrCode) html5QrCode.stop();
}

async function runOCR() {
  setStatus("Scanning...");
  try {
    const rect = scanWindow.getBoundingClientRect();
    const vRect = video.getBoundingClientRect();
    const scaleX = video.videoWidth / vRect.width;
    const scaleY = video.videoHeight / vRect.height;

    const canvas = document.createElement("canvas");
    canvas.width = Math.floor(rect.width * scaleX);
    canvas.height = Math.floor(rect.height * scaleY);
    const ctx = canvas.getContext("2d");
    ctx.filter = "grayscale(100%) contrast(260%) brightness(155%)";
    ctx.drawImage(video, (rect.left-vRect.left)*scaleX, (rect.top-vRect.top)*scaleY, canvas.width, canvas.height, 0, 0, canvas.width, canvas.height);

    const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
      tessedit_pageseg_mode: 7,
      tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789/-",
    });

startScanner();
</script>
</body>
</html>
