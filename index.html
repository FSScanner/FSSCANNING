<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FS Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body {
  margin: 0;
  padding: 0;
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

#topBar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.85);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

h2 {
  margin: 0;
  font-size: 28px;
  text-align: center;
}

#scanResult {
  width: 100%;
  box-sizing: border-box;
  padding: 14px;
  font-size: 24px;
  border-radius: 8px;
  border: none;
}

.buttonRow {
  display: flex;
  gap: 10px;
}

button {
  flex: 1;
  padding: 16px;
  font-size: 18px;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

#startScanBtn { background: #fbbf00; color: black; }
#stopScanBtn { background: #cc0000; color: white; }
#ocrBtn { background: #0099ff; color: white; }
#flashBtn { background: #ffaa00; color: black; }

#reader {
  position: fixed;
  top: 220px;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100vw;
  height: calc(100vh - 220px);
  overflow: hidden;
}

video {
  object-fit: cover !important;
}

#statusMessage {
  position: fixed;
  bottom: 10px;
  left: 10px;
  right: 10px;
  z-index: 9999;
  background: rgba(0,0,0,0.8);
  padding: 12px;
  border-radius: 8px;
  text-align: center;
  font-size: 20px;
}

</style>

</head>

<body>

<div id="topBar">

  <h2>FS Scanner</h2>

  <input type="text" id="scanResult" placeholder="Scanned result">

  <div class="buttonRow">
    <button id="startScanBtn">Start</button>
    <button id="stopScanBtn" disabled>Stop</button>
  </div>

  <div class="buttonRow">
    <button id="ocrBtn">SCAN TEXT</button>
    <button id="flashBtn">FLASH</button>
  </div>

</div>

<div id="reader"></div>

<div id="statusMessage">Ready</div>

<script>

let html5QrcodeScanner = null;
let lastDetected = "";
let detectionCount = 0;
let torchOn = false;

const scanResultInput = document.getElementById("scanResult");
const statusMessage = document.getElementById("statusMessage");

function setStatus(message) {
  statusMessage.innerText = message;
}

function sendToAppsScript(value) {

  const raw = value.toString().trim();

  lastDetected = "";
  detectionCount = 0;

  scanResultInput.value = raw;

  if (!window.opener) {
    alert("No parent window found");
    return;
  }

  window.opener.postMessage({
    type: "barcode",
    value: raw
  }, "*");

  setStatus("Sent: " + raw);

  setTimeout(() => {
    window.close();
  }, 300);
}

async function startScanner() {

  if (html5QrcodeScanner) return;

  html5QrcodeScanner = new Html5Qrcode("reader");

  try {

    const cameras = await Html5Qrcode.getCameras();

    if (!cameras || cameras.length === 0) {
      setStatus("No camera found");
      return;
    }

    const backCamera =
      cameras.find(c => c.label.toLowerCase().includes("back")) ||
      cameras[0];

    await html5QrcodeScanner.start(

      backCamera.id,

      {
        fps: 10,
        qrbox: { width: 300, height: 140 },
        aspectRatio: 1.777
      },

      (decodedText) => {

        const raw = decodedText.toString().trim();

        console.log("Raw barcode:", raw);

        if (raw === lastDetected) {
          detectionCount++;
        } else {
          lastDetected = raw;
          detectionCount = 1;
        }

        setStatus(`Confirming scan (${detectionCount}/2)`);

        if (detectionCount >= 2) {

          setStatus("Barcode confirmed");

          sendToAppsScript(raw);

          stopScanner();
        }
      },

      (errorMessage) => {
        // optional silent fail
        console.log("Scan error:", errorMessage);
      }

    );

    document.getElementById("startScanBtn").disabled = true;
    document.getElementById("stopScanBtn").disabled = false;

    setStatus("Scanning...");

  } catch (err) {
    console.error(err);
    setStatus("Camera failed");
  }
}
  
async function stopScanner() {

  if (!html5QrcodeScanner) return;

  try {
    await html5QrcodeScanner.stop();
    await html5QrcodeScanner.clear();
  } catch(e) {}

  html5QrcodeScanner = null;

  document.getElementById("startScanBtn").disabled = false;
  document.getElementById("stopScanBtn").disabled = true;

  setStatus("Stopped");
}

async function toggleFlash() {

  if (!html5QrcodeScanner) {
    setStatus("Scanner not running");
    return;
  }

  try {
    const track = html5QrcodeScanner.getRunningTrack();

    if (!track) {
      setStatus("No camera track");
      return;
    }

    const capabilities = track.getCapabilities();

    if (!capabilities.torch) {
      setStatus("Flash not supported");
      return;
    }

    torchOn = !torchOn;

    await track.applyConstraints({
      advanced: [{ torch: torchOn }]
    });

    setStatus(torchOn ? "Flash ON" : "Flash OFF");

  } catch (err) {
    console.error(err);
    setStatus("Flash failed");
  }
}

async function runOCR() {

  setStatus("Reading text...");

  try {

    const video = document.querySelector("video");

    if (!video) {
      alert("Camera not running");
      return;
    }

    const canvas = document.createElement("canvas");
    const scale = 2;

    canvas.width = video.videoWidth * scale;
    canvas.height = video.videoHeight * scale;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {

      const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
      const contrast = avg > 140 ? 255 : 0;

      data[i] = contrast;
      data[i + 1] = contrast;
      data[i + 2] = contrast;
    }

    ctx.putImageData(imageData, 0, 0);

    const image = canvas.toDataURL("image/png");

    const result = await Tesseract.recognize(image, 'eng');

    const text = result.data.text || "";

    const cleanedText = text
      .toUpperCase()
      .replace(/\r/g, ' ')
      .replace(/\n/g, ' ')
      .replace(/\s+/g, ' ');

    console.log("OCR RAW:", text);
    console.log("OCR CLEAN:", cleanedText);

    const match = cleanedText.match(
      /\b(G9|M9|W9|FS8|SG8|SW8|T9)[A-Z0-9\/_-]*\b/
    );

    if (!match) {
      setStatus("No valid order found");
      alert("No valid order number detected");
      return;
    }

    const order = match[0].trim();

    sendToAppsScript(order);

    setStatus("Order detected");

  } catch(err) {
    console.error(err);
    setStatus("OCR failed");
  }
}

document.getElementById("startScanBtn").addEventListener("click", startScanner);
document.getElementById("stopScanBtn").addEventListener("click", stopScanner);
document.getElementById("ocrBtn").addEventListener("click", runOCR);
document.getElementById("flashBtn").addEventListener("click", toggleFlash);

startScanner();

</script>

</body>
</html>
