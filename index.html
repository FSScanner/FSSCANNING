<script src="https://unpkg.com/html5-qrcode"></script>

<input id="barcodeInput" placeholder="Scan here…" style="width:100%;font-size:20px;margin-bottom:20px;" autofocus>

<div id="reader" style="width:300px;"></div>

<script>
  const input = document.getElementById("barcodeInput");
  input.focus();

  function wedgeType(text) {
    input.value = "";
    for (let char of text) {
      input.dispatchEvent(new KeyboardEvent("keydown", { key: char }));
      input.value += char;
      input.dispatchEvent(new KeyboardEvent("keyup", { key: char }));
      input.dispatchEvent(new Event("input"));
    }
    input.dispatchEvent(new KeyboardEvent("keydown", { key: "Enter" }));
    input.dispatchEvent(new KeyboardEvent("keyup", { key: "Enter" }));
  }

  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },

    // ✅ THIS IS WHERE YOUR CALLBACK GOES
    (decodedText) => {
      wedgeType(decodedText);
      scanner.stop().then(() => scanner.clear());
    },

    (errorMessage) => {}
  );
</script>
